apiVersion: apps/v1
kind: Deployment
metadata:
  name: drama-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drama-backend
  template:
    metadata:
      labels:
        app: drama-backend
    spec:
      containers:
        - name: backend
          image: drama-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_HOST
              value: mysql-service
            - name: MYSQL_USER
              value: root
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: REDIS_HOST
              value: redis-service
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/drama/recommend?page=0&size=1
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/drama/recommend?page=0&size=1
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: drama-backend-service
spec:
  type: LoadBalancer
  selector:
    app: drama-backend
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drama-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drama-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
