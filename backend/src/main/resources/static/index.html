<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>短剧播放器</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/interaction.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <div id="app">
        <!-- 主页 -->
        <div id="home-page" class="page active">
            <div class="top-bar">
                <h1>短剧播放器</h1>
                <div class="top-bar-right">
                    <div id="theme-toggle" class="theme-toggle" onclick="themeManager.toggle()">☀️</div>
                    <div class="search-icon" onclick="app.showSearch()">🔍</div>
                </div>
            </div>
            <div class="banner-container">
                <div id="banner-carousel" class="banner-carousel"></div>
            </div>
            <div id="continue-section" class="section" style="display:none">
                <h2 class="section-title">继续观看</h2>
                <div id="continue-list" class="drama-grid"></div>
            </div>
            <div class="category-section">
                <div id="category-tabs" class="category-tabs"></div>
            </div>
            <div class="section">
                <h2 class="section-title">推荐短剧</h2>
                <div id="recommend-list" class="drama-grid"></div>
            </div>
            <div class="section">
                <h2 class="section-title">热播短剧</h2>
                <div id="hot-list" class="drama-grid"></div>
            </div>
        </div>

        <!-- 详情页 -->
        <div id="detail-page" class="page">
            <div class="detail-header">
                <button class="back-btn" onclick="app.goBack()">←</button>
                <h2 id="detail-title"></h2>
            </div>
            <div class="detail-content">
                <div class="detail-cover">
                    <img id="detail-cover-img" src="" alt="">
                </div>
                <div class="detail-info">
                    <p id="detail-description"></p>
                    <div class="detail-meta">
                        <span id="detail-episodes"></span>
                        <span id="detail-status"></span>
                    </div>
                    <div class="detail-actions">
                        <button id="favorite-btn" class="favorite-btn" onclick="app.toggleFavorite(state.currentDrama?.id)">🤍 追剧</button>
                        <button class="share-btn" onclick="app.shareDrama(state.currentDrama)">📤 分享</button>
                    </div>
                    <div class="detail-rating">
                        <span class="rating-score" id="rating-score">0.0</span>
                        <div class="rating-stars" id="rating-stars">
                            <span class="star" data-score="1">★</span>
                            <span class="star" data-score="2">★</span>
                            <span class="star" data-score="3">★</span>
                            <span class="star" data-score="4">★</span>
                            <span class="star" data-score="5">★</span>
                        </div>
                        <span class="rating-count" id="rating-count">(0人评分)</span>
                    </div>
                </div>
                <div class="episode-list">
                    <h3>选集</h3>
                    <div id="episode-grid" class="episode-grid"></div>
                </div>
                <div class="drama-comments-section">
                    <h3>评论 <span id="drama-comment-count"></span></h3>
                    <div class="comment-input-wrap">
                        <textarea id="drama-comment-input" placeholder="说点什么..." maxlength="500"></textarea>
                        <button onclick="app.postDramaComment()">发送</button>
                    </div>
                    <div id="drama-comments-list" class="comments-list"></div>
                </div>
            </div>
        </div>

        <!-- 搜索页 -->
        <div id="search-page" class="page">
            <div class="search-header">
                <button class="back-btn" onclick="app.closeSearch()">←</button>
                <div class="search-input-wrap">
                    <input id="search-input" type="text" placeholder="搜索短剧..." oninput="app.onSearchInput(this.value)" onkeydown="if(event.key==='Enter')app.doSearch(this.value)">
                    <button class="search-btn" onclick="app.doSearch(document.getElementById('search-input').value)">搜索</button>
                </div>
            </div>
            <div id="search-history" class="search-history" style="display:none"></div>
            <div id="search-results" class="search-results"></div>
        </div>

        <!-- 播放页 -->
        <div id="player-page" class="page">
            <div class="player-container">
                <video id="video-player" controls></video>
                <div id="player-error" style="display:none; color:#fff; text-align:center; padding:20px; background:rgba(0,0,0,0.8); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); border-radius:8px; z-index:10;"></div>
                <div id="interaction-overlay" class="interaction-overlay hidden"></div>
            </div>
            <div class="player-controls">
                <button class="back-btn" onclick="app.goBack()">←</button>
                <span id="player-title"></span>
            </div>
            <div class="danmaku-input-bar">
                <input type="text" id="danmaku-input" placeholder="发一条弹幕..." maxlength="100"
                       onkeydown="if(event.key==='Enter')player.sendCurrentDanmaku()">
                <div class="danmaku-colors">
                    <button class="danmaku-color-btn active" data-color="#fff" style="background:#fff" onclick="player.sendCurrentDanmaku('#fff')"></button>
                    <button class="danmaku-color-btn" data-color="#FF2E6E" style="background:#FF2E6E" onclick="player.sendCurrentDanmaku('#FF2E6E')"></button>
                    <button class="danmaku-color-btn" data-color="#FFD700" style="background:#FFD700" onclick="player.sendCurrentDanmaku('#FFD700')"></button>
                </div>
                <button class="danmaku-send-btn" onclick="player.sendCurrentDanmaku()">发送</button>
                <button class="danmaku-toggle-btn" id="danmaku-toggle" onclick="player.toggleDanmaku()">弹幕🔊</button>
            </div>
        </div>

        <!-- 彩蛋图鉴页 -->
        <div id="eggs-page" class="page">
            <div class="detail-header">
                <button class="back-btn" onclick="app.goBack()">←</button>
                <h2>🥚 彩蛋图鉴</h2>
            </div>
            <div id="eggs-content" class="detail-content"></div>
        </div>

        <!-- 登录页 -->
        <div id="login-page" class="page">
            <div class="login-container">
                <h2>登录</h2>
                <div class="login-form">
                    <input id="login-username" type="text" placeholder="用户名">
                    <input id="login-password" type="password" placeholder="密码">
                    <button class="login-btn" onclick="app.handleLogin()">登录</button>
                    <p class="login-switch">没有账号？<a onclick="document.getElementById('login-page').classList.remove('active');document.getElementById('register-page').classList.add('active')">去注册</a></p>
                </div>
            </div>
        </div>

        <!-- 注册页 -->
        <div id="register-page" class="page">
            <div class="login-container">
                <h2>注册</h2>
                <div class="login-form">
                    <input id="reg-username" type="text" placeholder="用户名">
                    <input id="reg-password" type="password" placeholder="密码">
                    <input id="reg-nickname" type="text" placeholder="昵称（可选）">
                    <button class="login-btn" onclick="app.handleRegister()">注册</button>
                    <p class="login-switch">已有账号？<a onclick="document.getElementById('register-page').classList.remove('active');document.getElementById('login-page').classList.add('active')">去登录</a></p>
                </div>
            </div>
        </div>

        <!-- 我的页面 -->
        <div id="mine-page" class="page">
            <div class="mine-header">
                <div class="mine-avatar" id="mine-avatar">👤</div>
                <div class="mine-info">
                    <div class="mine-nickname" id="mine-nickname">未登录</div>
                    <div class="mine-points" id="mine-points"></div>
                </div>
            </div>
            <div class="mine-menu">
                <div class="mine-menu-item" onclick="app.showEggCollection()">
                    <span class="mine-menu-icon">🥚</span>
                    <span class="mine-menu-text">彩蛋图鉴</span>
                    <span class="mine-menu-arrow">›</span>
                </div>
                <div class="mine-menu-item" onclick="app.showFavoriteList()">
                    <span class="mine-menu-icon">❤️</span>
                    <span class="mine-menu-text">我的追剧</span>
                    <span class="mine-menu-arrow">›</span>
                </div>
                <div class="mine-menu-item" onclick="themeManager.toggle()">
                    <span class="mine-menu-icon">🎨</span>
                    <span class="mine-menu-text">主题切换</span>
                    <span class="mine-menu-arrow">›</span>
                </div>
            </div>
            <div class="mine-auth-section">
                <button id="mine-auth-btn" class="mine-auth-btn" onclick="app.showLoginPage()">登录 / 注册</button>
            </div>
        </div>

        <!-- 底部导航栏 -->
        <div class="bottom-nav">
            <div class="nav-item active" data-page="home" onclick="app.navigateTo('home')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </div>
            <div class="nav-item" data-page="mine" onclick="app.navigateTo('mine')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">我的</span>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/player.js"></script>
    <script src="js/interaction.js"></script>
    <script src="js/app.js"></script>
    <script>themeManager.init();</script>
</body>
</html>
