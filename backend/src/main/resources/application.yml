server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/drama_player?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

app:
  video:
    base-url: ${VIDEO_BASE_URL:http://localhost:9000/videos}
  image:
    base-url: ${IMAGE_BASE_URL:http://localhost:9000/images}

jwt:
  secret: ${JWT_SECRET:a]9kL2mN5pQ8sT1vX3yA6bC0dE7fG4hI}
  expiration-ms: 604800000
