server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:drama_player;DB_CLOSE_DELAY=-1;MODE=MYSQL;CHARSET=UTF-8
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-init-sql: SET NAMES UTF-8
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  video:
    base-url: https://test-streams.mux.dev
  image:
    base-url: https://picsum.photos

jwt:
  secret: ${JWT_SECRET:h2DevOnlySecretKeyThatIsAtLeast32Chars!}
  expiration-ms: 604800000
