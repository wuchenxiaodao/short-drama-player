<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>短剧播放器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--deep-black:#0A0A0A;--electric-purple:#8B5CF6;--purple-dark:#6D28D9;--purple-light:#A78BFA;--neon-pink:#E8456B;--cyan:#38BDF8;--dark-gray:#1A1A2E;--medium-gray:#2A2A3E;--light-gray:#94A3B8;--card-bg:#16162A;--star-yellow:#FBBF24;--highlight-gold:#F59E0B;--text-primary:#F1F5F9;--text-secondary:#94A3B8;--surface-elevated:#1E1E32;--border-subtle:rgba(255,255,255,0.06)}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--deep-black);color:var(--text-primary);overflow-x:hidden;max-width:430px;margin:0 auto;min-height:100vh;letter-spacing:0.01em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,14,26,.92);backdrop-filter:blur(24px) saturate(1.2);display:flex;justify-content:space-around;padding:6px 0 calc(env(safe-area-inset-bottom,0px) + 14px);z-index:100;border-top:1px solid var(--border-subtle)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.45;transition:all .25s cubic-bezier(.4,0,.2,1);padding:6px 24px;border-radius:16px;position:relative;-webkit-tap-highlight-color:transparent}
.nav-item:active{transform:scale(0.92)}
.nav-item.active{opacity:1;background:rgba(56,189,248,0.08)}
.nav-item.active .nav-icon{color:var(--cyan)}
.nav-item.active .nav-label{color:var(--cyan);font-weight:600}
.nav-item.active::after{content:'';position:absolute;bottom:-2px;width:16px;height:3px;background:var(--cyan);border-radius:2px}
.nav-icon{font-size:24px;color:var(--light-gray);transition:color .25s}.nav-label{font-size:10px;color:var(--light-gray);transition:all .25s}
.page{display:none;padding-bottom:70px}.page.active{display:block;animation:pageIn .3s ease-out}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.top-bar{padding:48px 16px 16px}
.top-bar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.top-bar h1{font-size:24px;color:var(--text-primary);font-weight:700;letter-spacing:-0.02em}
.top-bar h1 span{color:var(--cyan)}
.search-wrap{position:relative}
.search-bar{width:100%;height:42px;border-radius:14px;border:1px solid var(--border-subtle);background:rgba(255,255,255,.04);color:var(--text-primary);padding:0 16px 0 42px;font-size:14px;outline:none;transition:all .25s}
.search-bar::placeholder{color:rgba(148,163,184,.5)}
.search-bar:focus{border-color:var(--cyan);background:rgba(56,189,248,.04);box-shadow:0 0 0 3px rgba(56,189,248,.08)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-secondary);pointer-events:none}
.banner-container{position:relative;width:calc(100% - 24px);height:200px;overflow:hidden;margin:0 auto 16px;border-radius:16px}
.banner-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);height:100%}
.banner-slide{min-width:100%;height:100%;position:relative;overflow:hidden}
.banner-slide svg{width:100%;height:100%}
.banner-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 16px;background:linear-gradient(transparent,rgba(10,10,10,.95))}
.banner-overlay h2{font-size:22px;font-weight:700;letter-spacing:-0.01em}
.banner-overlay .meta{display:flex;align-items:center;gap:8px;margin-top:6px}
.banner-overlay .rating{color:var(--star-yellow);font-size:13px;font-weight:500}.banner-overlay .tag{color:var(--neon-pink);font-size:12px;background:rgba(232,69,107,.15);padding:2px 8px;border-radius:8px}
.banner-btn{margin-top:12px;padding:9px 28px;background:linear-gradient(135deg,var(--electric-purple),var(--purple-dark));border:none;border-radius:22px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(139,92,246,.3);-webkit-tap-highlight-color:transparent}
.banner-btn:active{transform:scale(0.95)}
.banner-dots{position:absolute;bottom:10px;right:16px;display:flex;gap:5px}
.banner-dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.3);transition:all .3s;cursor:pointer}
.banner-dot.active{width:18px;background:var(--cyan)}
.tabs{display:flex;padding:0 16px;margin-bottom:14px;gap:6px}
.tab{padding:8px 18px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-radius:20px;transition:all .2s;background:transparent;font-weight:500;-webkit-tap-highlight-color:transparent}
.tab:active{transform:scale(0.95)}
.tab.active{color:#fff;background:var(--cyan);font-weight:600;box-shadow:0 2px 12px rgba(56,189,248,.25)}
.drama-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 12px}
.drama-card{background:var(--card-bg);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);border:1px solid var(--border-subtle);-webkit-tap-highlight-color:transparent}
.drama-card:active{transform:scale(0.97)}
.drama-card .cover{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden}
.drama-card .cover svg{width:100%;height:100%}
.drama-card .cover::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(transparent,rgba(0,0,0,.4));pointer-events:none}
.drama-card .cover .hot-badge{position:absolute;top:8px;right:8px;background:rgba(232,69,107,.9);border-radius:10px;padding:3px 8px;font-size:10px;font-weight:600;z-index:1}
.drama-card .cover .new-badge{position:absolute;top:8px;left:8px;background:rgba(56,189,248,.9);border-radius:10px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--deep-black);z-index:1}
.drama-card .info{padding:10px 10px 12px}
.drama-card .info h3{font-size:14px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drama-card .info .meta{font-size:11px;color:var(--text-secondary);margin-top:3px}
.drama-card .info .rating{display:flex;align-items:center;gap:4px;margin-top:5px}
.drama-card .info .rating span{color:var(--star-yellow);font-size:12px;font-weight:500}
.detail-page{display:none}.detail-page.active{display:block;animation:pageIn .3s ease-out}
.detail-header{position:relative;height:300px}
.detail-header .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(24px) brightness(0.6);transform:scale(1.2)}
.detail-header .bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.2) 0%,rgba(10,10,10,.5) 50%,var(--deep-black) 100%)}
.detail-header .back-btn{position:absolute;top:48px;left:14px;background:rgba(0,0,0,.4);backdrop-filter:blur(12px);border:1px solid var(--border-subtle);color:var(--text-primary);width:40px;height:40px;border-radius:12px;font-size:18px;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.detail-header .back-btn:active{transform:scale(0.9)}
.detail-info{position:relative;z-index:2;display:flex;gap:16px;padding:0 16px;margin-top:-90px}
.detail-info .poster{width:120px;height:170px;border-radius:14px;background-size:cover;background-position:center;box-shadow:0 12px 40px rgba(0,0,0,.6);flex-shrink:0;overflow:hidden;border:2px solid rgba(255,255,255,.08)}
.detail-info .poster svg{width:100%;height:100%}
.detail-info .text h2{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.detail-info .text .stars{display:flex;align-items:center;gap:6px;margin-top:8px}
.detail-info .text .stars span{color:var(--star-yellow)}
.detail-info .text .category-tag{display:inline-block;margin-top:8px;padding:4px 12px;border-radius:10px;background:rgba(56,189,248,.12);color:var(--cyan);font-size:12px;font-weight:500}
.action-row{display:flex;gap:10px;padding:20px 16px}
.action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;background:var(--surface-elevated);border-radius:14px;cursor:pointer;transition:all .2s;border:1px solid var(--border-subtle);color:var(--text-secondary);font-size:13px;font-weight:500;-webkit-tap-highlight-color:transparent}
.action-btn:active{transform:scale(0.96);background:var(--medium-gray)}
.action-btn .icon{font-size:20px}
.section-title{font-size:16px;font-weight:600;padding:0 16px;margin-bottom:12px;color:var(--text-primary)}
.desc-text{padding:0 16px;font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:20px}
.episode-scroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:20px;-webkit-overflow-scrolling:touch}
.episode-scroll::-webkit-scrollbar{display:none}
.episode-card{min-width:72px;height:72px;background:var(--card-bg);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .2s;border:1px solid var(--border-subtle);color:var(--text-primary);font-size:13px;font-weight:600;gap:2px;-webkit-tap-highlight-color:transparent}
.episode-card:active{transform:scale(0.93);background:var(--medium-gray)}
.episode-card .ep-label{font-size:9px;color:var(--text-secondary);font-weight:400;text-transform:uppercase;letter-spacing:0.05em}
.related-scroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:100px;-webkit-overflow-scrolling:touch}
.related-scroll::-webkit-scrollbar{display:none}
.related-card{min-width:140px;background:var(--card-bg);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;border:1px solid var(--border-subtle);-webkit-tap-highlight-color:transparent}
.related-card:active{transform:scale(0.96)}
.related-card .rc-cover{width:140px;height:80px;overflow:hidden;position:relative}.related-card .rc-cover svg{width:100%;height:100%}.related-card .rc-cover::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(0,0,0,.3))}
.related-card .rc-info{padding:8px 10px}.related-card .rc-info h4{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);font-weight:500}.related-card .rc-info span{font-size:11px;color:var(--star-yellow)}
.play-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,14,26,.94);backdrop-filter:blur(24px) saturate(1.2);display:flex;align-items:center;gap:12px;padding:10px 16px calc(env(safe-area-inset-bottom,0px) + 12px);z-index:50;border-top:1px solid var(--border-subtle)}
.play-bar .pb-cover{width:48px;height:48px;border-radius:10px;overflow:hidden}.play-bar .pb-cover svg{width:100%;height:100%}
.play-bar .pb-text{flex:1}.play-bar .pb-text h4{font-size:14px;font-weight:600;color:var(--text-primary)}.play-bar .pb-text span{font-size:12px;color:var(--text-secondary)}
.play-bar .pb-btn{padding:9px 22px;border-radius:22px;border:none;background:linear-gradient(135deg,var(--electric-purple),var(--purple-dark));color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(139,92,246,.3);-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:6px}
.play-bar .pb-btn:active{transform:scale(0.95)}
.player-page{display:none;background:#000}.player-page.active{display:block}
.player-container{position:relative;width:100%;background:#000;overflow:hidden}
video{width:100%;display:block;max-height:240px;object-fit:contain;background:#000}
.player-controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.92));padding:24px 14px 14px}
.progress-container{position:relative;width:100%;height:24px;cursor:pointer;margin-bottom:8px}
.progress-bar{position:absolute;top:10px;left:0;right:0;height:6px;background:rgba(255,255,255,.15);border-radius:3px;overflow:visible}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--electric-purple));border-radius:3px;width:0%;position:relative}
.progress-fill::after{content:'';position:absolute;right:-7px;top:-4px;width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 0 8px rgba(56,189,248,.5),0 2px 4px rgba(0,0,0,.3)}
.controls-row{display:flex;align-items:center;justify-content:space-between}
.controls-left,.controls-right{display:flex;align-items:center;gap:12px}
.ctrl-btn{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;opacity:.85;transition:all .15s;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{transform:scale(0.9);opacity:1;background:rgba(255,255,255,.1)}
.time-display{font-size:12px;color:rgba(255,255,255,.65);font-variant-numeric:tabular-nums;font-weight:500}
.player-back{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);color:#fff;width:40px;height:40px;border-radius:12px;font-size:18px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.player-back:active{transform:scale(0.9)}
.episode-info-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface-elevated);border-bottom:1px solid var(--border-subtle)}
.episode-info-bar h3{font-size:16px;font-weight:600;color:var(--text-primary)}.episode-info-bar .ep-nav{display:flex;gap:10px}
.episode-info-bar .ep-nav button{padding:7px 18px;border-radius:20px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;transition:all .2s;font-weight:500;-webkit-tap-highlight-color:transparent}
.episode-info-bar .ep-nav button:active{background:rgba(255,255,255,.08);transform:scale(0.95)}
.highlights-panel{background:var(--surface-elevated);border-radius:16px;margin:12px 16px;padding:16px;border:1px solid var(--border-subtle)}
.highlights-panel h4{font-size:14px;color:var(--highlight-gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:600}
.highlight-list{display:flex;flex-direction:column;gap:8px}
.highlight-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(245,158,11,.04);border-radius:12px;cursor:pointer;border:1px solid rgba(245,158,11,.08);transition:all .2s;-webkit-tap-highlight-color:transparent}
.highlight-item:active{background:rgba(245,158,11,.1);transform:scale(0.98)}
.highlight-item .hl-time{font-size:11px;color:var(--highlight-gold);background:rgba(245,158,11,.12);padding:4px 10px;border-radius:8px;font-variant-numeric:tabular-nums;font-weight:600}
.highlight-item .hl-text{font-size:13px;flex:1;color:var(--text-primary)}
.highlight-item .hl-icon{font-size:18px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(14,14,26,.95);backdrop-filter:blur(20px);color:var(--text-primary);padding:14px 24px;border-radius:14px;z-index:300;display:none;text-align:center;border:1px solid var(--border-subtle);box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:14px;font-weight:500;max-width:80%;white-space:nowrap}
.toast.show{display:block;animation:toastIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.points-popup{position:fixed;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--highlight-gold),var(--star-yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;pointer-events:none;z-index:250;animation:floatUp 1.5s ease-out forwards;text-shadow:none;filter:drop-shadow(0 0 8px rgba(245,158,11,.4))}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-40px) scale(1.1)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}
.bubble-cloud{position:absolute;top:10px;right:10px;z-index:15;display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:none}
.bubble{background:rgba(10,10,20,.85);backdrop-filter:blur(12px);border:1px solid rgba(245,158,11,.25);border-radius:22px;padding:7px 14px;font-size:13px;color:var(--highlight-gold);pointer-events:auto;cursor:pointer;animation:bubbleIn .4s cubic-bezier(.34,1.56,.64,1);transition:transform .2s;display:flex;align-items:center;gap:6px;font-weight:500}
.bubble:active{transform:scale(1.1)}
.bubble .heart{color:var(--neon-pink);font-size:16px}
@keyframes bubbleIn{0%{opacity:0;transform:translateY(-16px) scale(.6)}100%{opacity:1;transform:translateY(0) scale(1)}}
.like-count{font-size:11px;color:var(--text-secondary);background:rgba(255,255,255,.08);border-radius:10px;padding:2px 8px}
.interaction-float{position:absolute;top:8px;right:8px;z-index:20;width:210px}
.if-card{background:rgba(10,10,20,.94);backdrop-filter:blur(20px) saturate(1.3);border-radius:16px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06);box-shadow:0 8px 32px rgba(0,0,0,.6);animation:cardIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardIn{0%{opacity:0;transform:scale(0.85) translateX(20px)}100%{opacity:1;transform:scale(1) translateX(0)}}
.if-card.vote{border-left:3px solid var(--electric-purple)}
.if-card.quiz{border-left:3px solid var(--cyan)}
.if-card.choice{border-left:3px solid var(--neon-pink)}
.if-card.egg{border-left:3px solid var(--highlight-gold);animation:cardIn .35s cubic-bezier(.34,1.56,.64,1),eggGlow 2s ease-in-out infinite alternate}
@keyframes eggGlow{0%{box-shadow:0 4px 16px rgba(245,158,11,.15)}100%{box-shadow:0 8px 32px rgba(245,158,11,.35)}}
.if-header{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.if-badge{font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600}
.if-badge.vote{background:rgba(139,92,246,.2);color:var(--electric-purple)}
.if-badge.quiz{background:rgba(56,189,248,.2);color:var(--cyan)}
.if-badge.choice{background:rgba(232,69,107,.2);color:var(--neon-pink)}
.if-badge.egg{background:rgba(245,158,11,.2);color:var(--highlight-gold)}
.if-close{background:none;border:none;color:rgba(255,255,255,.25);font-size:16px;cursor:pointer;margin-left:auto;padding:4px;border-radius:8px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.if-close:active{color:#fff;background:rgba(255,255,255,.1)}
.if-question{font-size:13px;line-height:1.5;margin-bottom:10px;color:var(--text-primary)}
.if-options{display:flex;flex-direction:column;gap:6px}
.if-opt{padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border-subtle);border-radius:12px;color:var(--text-primary);font-size:12px;cursor:pointer;transition:all .15s;text-align:left;-webkit-tap-highlight-color:transparent}
.if-opt:active{transform:scale(0.97)}
.if-opt.selected{background:rgba(139,92,246,.2);border-color:var(--electric-purple)}
.if-opt.correct{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4)}
.if-opt.wrong{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4)}
.if-stats{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-subtle)}
.if-stat-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.if-stat-label{font-size:10px;width:40px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.if-stat-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.if-stat-fill{height:100%;border-radius:3px;transition:width .5s ease-out}
.if-stat-pct{font-size:10px;width:32px;text-align:right;color:var(--text-secondary)}
.if-egg-btn{width:100%;padding:12px;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(251,191,36,.15));border:1px solid rgba(245,158,11,.25);border-radius:12px;color:var(--highlight-gold);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;font-weight:600;-webkit-tap-highlight-color:transparent}
.if-egg-btn:active{transform:scale(0.96);background:linear-gradient(135deg,rgba(245,158,11,.25),rgba(251,191,36,.25))}
.if-progress{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:10px;overflow:hidden}
.if-progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--electric-purple));border-radius:2px;transition:width linear}
.highlight-marker{position:absolute;top:1px;width:8px;height:8px;background:var(--highlight-gold);border-radius:50%;transform:translateX(-50%);cursor:pointer;z-index:5;box-shadow:0 0 8px rgba(245,158,11,.5);transition:transform .2s;animation:markerPulse 2s ease-in-out infinite}
@keyframes markerPulse{0%,100%{box-shadow:0 0 6px rgba(245,158,11,.4)}50%{box-shadow:0 0 14px rgba(245,158,11,.7)}}
.highlight-marker:hover{transform:translateX(-50%) scale(1.4)}

.interaction-marker{position:absolute;top:1px;width:8px;height:8px;background:var(--neon-pink);border-radius:50%;transform:translateX(-50%);cursor:pointer;z-index:5;box-shadow:0 0 8px rgba(232,69,107,.5);animation:markerPulse 2s ease-in-out infinite}

.star-picker .star.active{color:var(--star-yellow);text-shadow:0 0 8px rgba(251,191,36,.4)}
.star-picker .star:active{transform:scale(1.2)}
.online-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.85);backdrop-filter:blur(12px);border:1px solid rgba(56,189,248,.3);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--cyan);display:flex;align-items:center;gap:6px;z-index:15;font-weight:500;pointer-events:none}
.online-badge .pulse{width:8px;height:8px;background:var(--cyan);border-radius:50%;animation:pulse 2s ease-in-out infinite}

.auth-page{padding:0 24px 100px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}

.auth-brand{text-align:center;margin-bottom:48px}

.auth-form{display:flex;flex-direction:column;gap:14px}
.auth-input-wrap{position:relative}

.auth-form input:focus{border-color:var(--cyan);background:rgba(56,189,248,.04);box-shadow:0 0 0 3px rgba(56,189,248,.1)}

.auth-switch{text-align:center;margin-top:24px;color:var(--text-secondary);font-size:13px}

.profile-page{padding:48px 16px 100px}

.profile-stats{display:flex;gap:10px;margin-bottom:28px}

.profile-stat .num{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--electric-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.profile-stat .label{font-size:12px;color:var(--text-secondary);margin-top:4px;font-weight:500}

.profile-menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface-elevated);border-radius:14px;cursor:pointer;font-size:14px;border:1px solid var(--border-subtle);transition:all .2s;-webkit-tap-highlight-color:transparent}
.profile-menu-item:active{background:var(--medium-gray);transform:scale(0.98)}
.profile-menu-item .pm-icon{font-size:20px}
.profile-menu-item .pm-arrow{margin-left:auto;color:var(--text-secondary);font-size:14px;opacity:.5}
.logout-btn{margin-top:24px;width:100%;height:50px;border-radius:14px;border:1px solid rgba(232,69,107,.3);background:rgba(232,69,107,.06);color:var(--neon-pink);font-size:15px;cursor:pointer;font-weight:600;transition:all .2s;-webkit-tap-highlight-color:transparent}
.logout-btn:active{background:rgba(232,69,107,.15);transform:scale(0.98)}
/* Search results */
.search-results{padding:0 12px}
.search-empty{text-align:center;padding:80px 0;color:var(--text-secondary);font-size:14px}
/* Download progress */
.download-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface-elevated);border-radius:12px;margin:8px 16px;border:1px solid var(--border-subtle)}
.download-bar .dl-progress{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.download-bar .dl-progress .dl-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--electric-purple));border-radius:3px;transition:width .3s}
.download-bar .dl-text{font-size:12px;color:var(--text-secondary);white-space:nowrap}
.cached-badge{position:absolute;top:8px;right:8px;background:rgba(34,197,94,.9);border-radius:10px;padding:3px 8px;font-size:10px;font-weight:600}
/* Global polish */
*{-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
input,button{-webkit-appearance:none;appearance:none}
.detail-page.active,.player-page.active{animation:pageIn .3s ease-out}

<body>

<!-- Auth Page -->
<div id="authPage" class="page">
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-logo">&#9654;</div>
      <h1 id="authTitle">短剧播放器</h1>
      <p>沉浸式观影体验</p>
    </div>
    <div class="auth-form">
      <div class="auth-input-wrap">
        <span class="input-icon">&#128100;</span>
        <input type="text" id="authUsername" placeholder="用户名">
      </div>
      <div class="auth-input-wrap">
        <span class="input-icon">&#128274;</span>
        <input type="password" id="authPassword" placeholder="密码">
      </div>
      <div class="auth-input-wrap" id="authNicknameWrap" style="display:none">
        <span class="input-icon">&#128221;</span>
        <input type="text" id="authNickname" placeholder="昵称（注册时填写）">
      </div>
      <button class="btn-primary" id="authBtn" onclick="doAuth()">登录</button>
    </div>
    <div class="auth-switch">
      <span id="authSwitchText">没有账号？</span>
      <a id="authSwitchLink" onclick="toggleAuthMode()">立即注册</a>
    </div>
  </div>
</div>

<!-- Home Page -->
<div id="homePage" class="page">
  <div class="top-bar">
    <div class="top-bar-row">
      <h1>短剧播放器</h1>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" class="search-bar" id="searchInput" placeholder="搜索短剧..." oninput="onSearchInput()">
    </div>
  </div>
  <div id="homeContent">
    <div class="banner-container"><div class="banner-track" id="bannerTrack"></div><div class="banner-dots" id="bannerDots"></div></div>
    <div class="tabs">
      <div class="tab active" data-tab="recommend">推荐</div>
      <div class="tab" data-tab="hot">热播</div>
      <div class="tab" data-tab="new">新剧</div>
    </div>
    <div class="drama-grid" id="dramaGrid"></div>
  </div>
  <div id="searchResults" class="search-results" style="display:none">
    <div class="drama-grid" id="searchGrid"></div>
    <div class="search-empty" id="searchEmpty" style="display:none">未找到相关短剧</div>
  </div>
</div>

<!-- Detail Page -->
<div id="detailPage" class="detail-page">
  <div class="detail-header">
    <div class="bg" id="detailBg"></div>
    <div class="bg-overlay"></div>
    <button class="back-btn" onclick="showHomePage()">&#8592;</button>
  </div>
  <div class="detail-info">
    <div class="poster" id="detailPoster"></div>

      <div class="category-tag" id="detailCategory"></div>

  </div>
  <div class="user-rating-row" style="padding:0 16px">

    <span id="myRatingText" style="font-size:13px;color:var(--light-gray)"></span>
  </div>
  <div class="action-row">
    <button class="action-btn" onclick="shareDrama()"><span class="icon">&#8679;</span>分享</button>
    <button class="action-btn" onclick="downloadDrama()"><span class="icon">&#8635;</span>缓存</button>
  </div>
  <div id="downloadProgress"></div>
  <div class="section-title">&#128196; 剧情简介</div>
  <div class="desc-text" id="detailDesc"></div>
  <div class="section-title">&#127909; 选集</div>
  <div class="episode-scroll" id="episodeScroll"></div>
  <div class="section-title">&#128293; 相关推荐</div>

    <button class="pb-btn" onclick="playEpisode(currentPlayEp)">&#9654; 继续播放</button>
  </div>
</div>

<!-- Player Page -->
<div id="playerPage" class="player-page">
  <div class="player-container">
    <button class="player-back" onclick="backToDetail()">&#8592;</button>
    <video id="videoPlayer" playsinline webkit-playsinline></video>
    <div class="bubble-cloud" id="bubbleCloud"></div>
    <div class="interaction-float" id="interactionFloat"></div>
    <div class="online-badge" id="onlineBadge"><span class="pulse"></span><span id="onlineCount">0</span> 人正在看</div>
    <div class="player-controls">
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="highlightMarkers"></div>
        <div id="interactionMarkers"></div>
      </div>
      <div class="controls-row">
        <div class="controls-left">
          <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">&#9654;</button>
          <span class="time-display"><span id="currentTime">0:00</span> / <span id="totalTime">0:00</span></span>
        </div>
        <div class="controls-right">
          <button class="ctrl-btn" onclick="skipBack()">-10</button>
          <button class="ctrl-btn" onclick="skipForward()">+10</button>
          <button class="ctrl-btn" id="speedBtn" onclick="changeSpeed()">1x</button>
        </div>
      </div>
    </div>
  </div>
  <div class="episode-info-bar">
    <h3 id="playerEpTitle"></h3>
    <div class="ep-nav"><button onclick="playPrevEp()">上一集</button><button onclick="playNextEp()">下一集</button></div>
  </div>
  <div class="highlights-panel">
    <h4>&#9733; 高光时刻</h4>
    <div class="highlight-list" id="highlightList"></div>
  </div>
</div>

<!-- Profile Page -->
<div id="profilePage" class="page">

      </div>
    </div>
    <div class="profile-stats">

    </div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
</div>


<div class="toast" id="toast"></div>

function getDB() {
  let db;
  try { db = JSON.parse(localStorage.getItem(DB_KEY)) || null; } catch(e) {}
  if (!db) db = {dramas:EMBEDDED,ratings:{},progress:{},eggs:{},interactionVotes:{}};
  if (!db.dramas) db.dramas = EMBEDDED;
  if (!db.interactionVotes) { db.interactionVotes = {}; seedInteractionVotes(db); }
  // 预埋评分数据
  if (!db.ratings) {
    db.ratings = {};
    db.dramas.forEach(d => {
      const count = 50 + Math.floor(Math.random() * 200);
      const base = d.isHot ? 8 : 7;
      db.ratings[d.id] = Array.from({length: count}, () => Math.min(10, Math.max(1, base + Math.floor(Math.random() * 3) - 1)));
    });
  }
  // 预埋观看数据
  if (!db.views) {
    db.views = {};
    db.dramas.forEach(d => { db.views[d.id] = d.isHot ? 5000 + Math.floor(Math.random() * 15000) : 1000 + Math.floor(Math.random() * 5000); });
  }
  return db;
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function getDBDramas() { return getDB().dramas || EMBEDDED; }
function getDBDrama(id) { return getDBDramas().find(d=>d.id===id); }
function getDBRating(dramaId) { const db=getDB(); const r=db.ratings[dramaId]; return r?r.reduce((a,b)=>a+b,0)/r.length:0; }
function getDBRatingCount(dramaId) { const db=getDB(); return (db.ratings[dramaId]||[]).length; }
function getDBProgress(userId,epId) { const db=getDB(); return db.progress[userId+'_'+epId]||0; }
function setDBProgress(userId,epId,ms) { const db=getDB(); db.progress[userId+'_'+epId]=ms; saveDB(db); }
function getDBViewCount(dramaId) { const db=getDB(); return db.views?(db.views[dramaId]||0):0; }
function incDBViewCount(dramaId) { const db=getDB(); if(!db.views)db.views={}; db.views[dramaId]=(db.views[dramaId]||0)+1; saveDB(db); }
function dbUserRegister(username,password,nickname) {
  const db=getDB(); if(!db.users)db.users={};
  if(db.users[username]) return {success:false,message:'用户名已存在'};
  const id=Object.keys(db.users).length+1;
  db.users[username]={id,password,nickname:nickname||username,points:0};
  saveDB(db); return {success:true,userId:id,nickname:nickname||username};
}
function dbUserLogin(username,password) {
  const db=getDB(); if(!db.users)db.users={};
  const u=db.users[username]; if(!u||u.password!==password) return {success:false,message:'用户名或密码错误'};
  return {success:true,userId:u.id,nickname:u.nickname,username};
}
function dbUserGet(userId) {
  const db=getDB(); if(!db.users)return {};
  for(const k in db.users) { if(db.users[k].id===userId) return db.users[k]; }
  return {};
}
function dbDramaSummary(d) {
  return {id:d.id,title:d.title,category:d.category,totalEpisodes:d.totalEpisodes,
    rating:+getDBRating(d.id).toFixed(1),ratingCount:getDBRatingCount(d.id),
    viewCount:getDBViewCount(d.id),isNew:d.isNew,isHot:d.isHot};
}
function submitDBRating(userId,dramaId,score) {
  const db=getDB(); if(!db.ratings[dramaId]) db.ratings[dramaId]=[];
  db.ratings[dramaId].push(score); saveDB(db);
  return {success:true,averageRating:getDBRating(dramaId).toFixed(1),ratingCount:db.ratings[dramaId].length};
}
function collectDBEgg(userId,interactionId,content) {
  const db=getDB(); if(!db.eggs[userId])db.eggs[userId]=[];
  if(db.eggs[userId].find(e=>e.interactionId===interactionId)) return {success:false,message:'already'};
  db.eggs[userId].push({interactionId,eggContent:content,collectedAt:new Date().toISOString()});
  saveDB(db); return {success:true};
}
function getDBEggs(userId) { const db=getDB(); return (db.eggs[userId]||[]).reverse(); }
function dbUserAddPoints(userId,pts) {
  const db=getDB(); if(!db.users)return;
  for(const k in db.users) { if(db.users[k].id===userId) { db.users[k].points=(db.users[k].points||0)+pts; saveDB(db); return; } }
}
function getInteractionVotes(interactionId) {
  const db=getDB(); if(!db.interactionVotes)db.interactionVotes={};
  return db.interactionVotes[interactionId]||{};
}
function submitInteractionVote(interactionId,optionId) {
  const db=getDB(); if(!db.interactionVotes)db.interactionVotes={};
  if(!db.interactionVotes[interactionId])db.interactionVotes[interactionId]={};
  const votes=db.interactionVotes[interactionId];
  votes[optionId]=(votes[optionId]||0)+1;
  saveDB(db); return votes;
}
function buildInteractionStats(interactionId,votes) {
  const total=Object.values(votes).reduce((a,b)=>a+b,0);
  const optionStats={};
  for(const oid in votes) {
    optionStats[oid]={count:votes[oid],percentage:total?Math.round(votes[oid]/total*100):0};
  }
  return {interactionId,totalParticipants:total,optionStats};
}
function seedInteractionVotes(db) {
  const dramas = db.dramas || EMBEDDED;
  dramas.forEach(d => {
    if (!d.interactions) return;
    for (const epNum in d.interactions) {
      d.interactions[epNum].forEach((inter, idx) => {
        const iid = d.id * 100 * 100 + (+epNum) * 100 + idx;
        const totalVotes = 30 + Math.floor(Math.random() * 120);
        const votes = {};
        if (inter.type === 'EGG') { votes[1] = totalVotes; }
        else {
          let remaining = totalVotes;
          const optCount = inter.opts.length;
          const leadIdx = Math.floor(Math.random() * optCount);
          inter.opts.forEach((o, i) => {
            if (i === optCount - 1) { votes[o.id] = remaining; }
            else {
              const share = i === leadIdx ? 0.35 + Math.random() * 0.2 : 0.15 + Math.random() * 0.2;
              const cnt = Math.max(1, Math.floor(remaining * share));
              votes[o.id] = cnt;
              remaining -= cnt;
            }
          });
        }
        db.interactionVotes[iid] = votes;
      });
    }
  });
}

// 统一API层：先尝试后端，失败则用本地数据
const API_BASE = 'http://localhost:8080';
let backendOK = false;
async function api(url, opts) {
  if(backendOK) {
    try { const r=await fetch(API_BASE+url,opts); return r.json(); } catch(e) { backendOK=false; }
  }
  // 本地路由
  return localAPI(url,opts);
}
function localAPI(url,opts) {
  const method = opts?(opts.method||'GET'):'GET';
  const body = opts&&opts.body ? JSON.parse(opts.body) : null;
  // Auth
  if(url==='/api/auth/register') return dbUserRegister(body.username,body.password,body.nickname);
  if(url==='/api/auth/login') return dbUserLogin(body.username,body.password);
  if(url.match(/\/api\/auth\/(\d+)/)) { const uid=+url.match(/\/api\/auth\/(\d+)/)[1]; return dbUserGet(uid); }
  // Drama
  if(url.match(/\/api\/drama\/recommend/)) return {content:getDBDramas().map(dbDramaSummary)};
  if(url.match(/\/api\/drama\/hot/)) return {content:getDBDramas().filter(d=>d.isHot).map(dbDramaSummary)};
  if(url.match(/\/api\/drama\/new/)) return {content:getDBDramas().filter(d=>d.isNew).map(dbDramaSummary)};
  if(url.match(/\/api\/drama\/search/)) { const kw=decodeURIComponent(url.match(/keyword=([^&]+)/)[1]); return {content:getDBDramas().filter(d=>d.title.includes(kw)||d.category.includes(kw)).map(dbDramaSummary)}; }
  if(url.match(/\/api\/drama\/(\d+)\/detail/)) {
    const id=+url.match(/\/api\/drama\/(\d+)\/detail/)[1]; const d=getDBDrama(id); if(!d)return{};
    const eps=d.episodes.map((ep,i)=>({id:d.id*100+ep.num,episodeNumber:ep.num,title:ep.title,durationSeconds:90,watchPositionMs:getDBProgress(currentUser?currentUser.userId:0,d.id*100+ep.num),isHot:ep.num<=3}));
    const related=getDBDramas().filter(x=>x.id!==id).slice(0,6).map(dbDramaSummary);
    return {id:d.id,title:d.title,description:d.description,category:d.category,totalEpisodes:d.totalEpisodes,rating:+getDBRating(id).toFixed(1),ratingCount:getDBRatingCount(id),viewCount:getDBViewCount(id),episodes:eps,relatedDramas:related};
  }
  // Episode playinfo
  if(url.match(/\/api\/episode\/(\d+)\/playinfo/)) {
    const epId=+url.match(/\/api\/episode\/(\d+)\/playinfo/)[1];
    const dramaId=Math.floor(epId/100); const epNum=epId%100;
    const d=getDBDrama(dramaId); if(!d)return{};
    const interList=(d.interactions&&d.interactions[epNum]||[]).map((it,idx)=>({id:epId*100+idx,timestampMs:it.ts,type:it.type,questionText:it.q,options:it.opts.map(o=>({id:o.id,text:o.t})),correctOptionId:it.correct||null}));
    return {episodeId:epId,videoUrl:getVideoUrl(dramaId,epNum),durationSeconds:90,lastPositionMs:getDBProgress(currentUser?currentUser.userId:0,epId),interactions:interList};
  }
  // Rating
  if(url==='/api/rating/submit') return submitDBRating(body.userId,body.dramaId,body.score);
  if(url.match(/\/api\/rating\/user/)) { const p=new URLSearchParams(url.split('?')[1]); const db=getDB(); const arr=db.ratings[p.get('dramaId')]||[]; return {score:arr.length?arr[arr.length-1]:0}; }
  if(url.match(/\/api\/rating\/stats/)) { const p=new URLSearchParams(url.split('?')[1]); return {averageRating:getDBRating(+p.get('dramaId')).toFixed(1),ratingCount:getDBRatingCount(+p.get('dramaId'))}; }
  // Interaction
  if(url==='/api/interaction/answer') {
    const epId=Math.floor(body.interactionId/100); const interIdx=body.interactionId%100;
    const dramaId=Math.floor(epId/100); const epNum=epId%100;
    const d=getDBDrama(dramaId); const inter=d&&d.interactions&&(d.interactions[epNum]||[])[interIdx];
    if(inter&&inter.type==='EGG') { collectDBEgg(body.userId,body.interactionId,inter.q); dbUserAddPoints(body.userId,5); }
    if(inter&&inter.correct&&body.choiceId===inter.correct) dbUserAddPoints(body.userId,10);
    const votes=submitInteractionVote(body.interactionId,body.choiceId);
    return {success:true,stats:buildInteractionStats(body.interactionId,votes)};
  }
  if(url.match(/\/api\/interaction\/(\d+)\/stats/)) {
    const iid=+url.match(/\/api\/interaction\/(\d+)/)[1];
    const votes=getInteractionVotes(iid);
    return buildInteractionStats(iid,votes);
  }
  // Eggs
  if(url.match(/\/api\/user\/(\d+)\/eggs$/)) return getDBEggs(+url.match(/\/api\/user\/(\d+)/)[1]);
  if(url.match(/\/api\/user\/(\d+)\/eggs\/count/)) return {count:getDBEggs(+url.match(/\/api\/user\/(\d+)/)[1]).length};
  // Online (local simulation)
  if(url==='/api/online/heartbeat') return {success:true};
  if(url.match(/\/api\/online\/episode\/(\d+)\/count/)) return {onlineCount:Math.floor(Math.random()*50)+10};
  // Progress
  if(url==='/api/progress/report') { setDBProgress(body.userId,body.episodeId,body.positionMs); return {success:true}; }
  return {};
}

// ========== SVG Cover Generator ==========
const THEMES = {
  '悬疑': { bg1:'#1a0a2e', bg2:'#0d1b2a', accent:'#8B5CF6', icon:'&#128270;', pattern:'mystery' },
  '古装': { bg1:'#2d1b00', bg2:'#1a0a00', accent:'#FFD700', icon:'&#9876;', pattern:'ancient' },
  '都市': { bg1:'#0a1628', bg2:'#0a0a1e', accent:'#38BDF8', icon:'&#127961;', pattern:'city' },
  '甜宠': { bg1:'#2d0a1e', bg2:'#1a0a14', accent:'#FF69B4', icon:'&#128151;', pattern:'love' }
};

function genCoverSVG(title, category, id) {
  const t = THEMES[category] || THEMES['都市'];
  const hash = [...title].reduce((a, c) => a + c.charCodeAt(0), 0);
  const shapes = [];
  for (let i = 0; i < 6; i++) {
    const x = (hash * (i + 1) * 37) % 360 + 20;
    const y = (hash * (i + 1) * 53) % 180 + 10;
    const r = (hash * (i + 1) * 17) % 30 + 10;
    shapes.push(`<circle cx="${x}" cy="${y}" r="${r}" fill="${t.accent}" opacity="${0.08 + i * 0.03}"/>`);
  }
  const titleShort = title.length > 6 ? title.slice(0, 6) : title;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
    <defs><linearGradient id="g${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${t.bg1}"/><stop offset="100%" stop-color="${t.bg2}"/></linearGradient></defs>
    <rect width="400" height="225" fill="url(#g${id})"/>
    ${shapes.join('')}
    <text x="200" y="100" text-anchor="middle" fill="${t.accent}" font-size="28" font-weight="bold" font-family="PingFang SC,Microsoft YaHei">${titleShort}</text>
    <text x="200" y="140" text-anchor="middle" fill="${t.accent}" font-size="16" opacity="0.6" font-family="PingFang SC">${category}</text>
    <text x="200" y="180" text-anchor="middle" fill="${t.accent}" font-size="32">${t.icon}</text>
  </svg>`;
}

function coverHTML(title, category, id, extraClass) {
  return `<div class="cover ${extraClass||''}">${genCoverSVG(title, category, id)}</div>`;
}

  if (!username || !password) return showToast('请填写用户名和密码');

      const nickname = document.getElementById('authNickname').value.trim() || username;
      const r = await api('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password, nickname }) });
      if (r.success) {
        currentUser = { userId: r.userId, nickname: r.nickname, username };
        saveUser();
        showToast('注册成功！');
        navTo('homePage');
      } else {
        showToast(r.message);
      }
    } else {
      const r = await api('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      if (r.success) {
        currentUser = { userId: r.userId, nickname: r.nickname, username: r.username };
        saveUser();
        showToast('登录成功！');
        navTo('homePage');
      } else {
        showToast(r.message);
      }
    }
  } catch (e) {
    showToast('网络错误，请检查后端服务');
  }
}

function renderStarPicker(current) {

// ========== Download/Cache ==========
function downloadDrama() {
  if (!currentDrama) return;
  const ep = currentDrama.episodes[0];
  if (!ep) return;

  const progressDiv = document.getElementById('downloadProgress');
  progressDiv.innerHTML = `<div class="download-bar"><div class="dl-progress"><div class="dl-fill" id="dlFill" style="width:0%"></div></div><span class="dl-text" id="dlText">准备中...</span></div>`;

  api(`/api/episode/${ep.id}/playinfo`).then(playInfo => {
    const videoUrl = API + playInfo.videoUrl;
    const xhr = new XMLHttpRequest();
    xhr.open('GET', videoUrl, true);
    xhr.responseType = 'blob';

    xhr.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        const fill = document.getElementById('dlFill');
        const text = document.getElementById('dlText');
        if (fill) fill.style.width = pct + '%';
        if (text) text.textContent = pct + '% (' + Math.round(e.loaded / 1024 / 1024) + 'MB)';
      }
    };

    xhr.onload = () => {
      if (xhr.status === 200) {
        const blob = xhr.response;
        cacheVideo(ep.id, { id: ep.id, dramaId: currentDrama.id, title: ep.title, blob, cachedAt: Date.now() })
          .then(() => {
            progressDiv.innerHTML = '<div style="padding:8px 16px;color:var(--cyan);font-size:13px">&#10003; 缓存完成 (' + Math.round(blob.size / 1024 / 1024) + 'MB)</div>';
            showToast('缓存成功！');
          })
          .catch(err => {
            showToast('存储失败: 可能空间不足');
            progressDiv.innerHTML = '';
          });
      } else {
        showToast('下载失败: HTTP ' + xhr.status);
        progressDiv.innerHTML = '';
      }
    };

    xhr.onerror = () => {
      showToast('下载失败: 网络错误');
      progressDiv.innerHTML = '';
    };

    xhr.send();
  }).catch(e => {
    showToast('获取播放信息失败');
    progressDiv.innerHTML = '';
  });
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('DramaCache', 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('videos')) {
        db.createObjectStore('videos', { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function cacheVideo(key, data) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const tx = db.transaction('videos', 'readwrite');
    tx.objectStore('videos').put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function getCachedVideo(key) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const tx = db.transaction('videos', 'readonly');
    const req = tx.objectStore('videos').get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

// ========== Player ==========
async function playEpisode(episodeId) {
  try {
    const uid = currentUser ? currentUser.userId : '';
    const playInfo = await api(`/api/episode/${episodeId}/playinfo${uid ? '?userId=' + uid : ''}`);
    currentEpisode = playInfo;

    const video = document.getElementById('videoPlayer');

    // Check cache first, then fallback to network
    let videoSrc = API + playInfo.videoUrl;
    try {
      const cached = await getCachedVideo(episodeId);
      if (cached && cached.blob) {
        videoSrc = URL.createObjectURL(cached.blob);
      }
    } catch (e) { /* ignore cache errors */ }

    video.src = videoSrc;
    video.playbackRate = currentSpeed;
    document.getElementById('playerEpTitle').textContent = `第${episodeId}集`;

  const highlights = generateHighlights(playInfo);
  highlightLikes = {};
  renderHighlightMarkers(highlights);
  renderInteractionMarkers(playInfo.interactions);
  renderHighlightList(highlights);
  renderBubbleCloud(highlights);
  setupInteractions(playInfo.interactions, video);
  startOnlineHeartbeat(episodeId);

  showPage('playerPage');
  document.getElementById('bottomNav').style.display = 'none';
  video.play();

  video.ontimeupdate = () => {
    updateTime();
    checkHighlightBubbles(video.currentTime, highlights);
    reportProgress(video.currentTime, episodeId);
  };
  video.onloadedmetadata = () => {
    document.getElementById('totalTime').textContent = formatTime(video.duration);
    renderHighlightMarkers(highlights);
    renderInteractionMarkers(playInfo.interactions);
  };
  video.onplay = () => { document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;'; };
  video.onpause = () => { document.getElementById('playPauseBtn').innerHTML = '&#9654;'; };
  video.onclick = () => togglePlay();

  } catch (e) {
    showToast('播放失败: ' + e.message);
  }
}

}

function renderInteractionMarkers(list) {

function renderHighlightList(list) {

// ========== Bubble Cloud ==========
function renderBubbleCloud(highlights) {
  const cloud = document.getElementById('bubbleCloud');
  cloud.innerHTML = '';
  highlights.forEach(h => { highlightLikes[h.time] = 0; });
}

function checkHighlightBubbles(currentTime, highlights) {
  const cloud = document.getElementById('bubbleCloud');
  highlights.forEach(h => {
    const diff = Math.abs(currentTime - h.time);
    const existing = document.getElementById('bubble-' + h.time);
    if (diff < 3 && !existing) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.id = 'bubble-' + h.time;
      bubble.innerHTML = `<span class="heart" onclick="event.stopPropagation();likeHighlight(${h.time})">&#128151;</span> ${h.text} <span class="like-count" id="like-${h.time}">${highlightLikes[h.time] || 0}</span>`;
      bubble.onclick = (e) => e.stopPropagation();
      cloud.appendChild(bubble);
      setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 6000);
    }
  });
}

function likeHighlight(time) {
  highlightLikes[time] = (highlightLikes[time] || 0) + 1;
  const el = document.getElementById('like-' + time);
  if (el) el.textContent = highlightLikes[time];
  showPoints('+1');
}

// ========== Interactions ==========
function setupInteractions(interactions, video) {
  const triggered = new Set();
  video.addEventListener('timeupdate', () => {
    const ms = video.currentTime * 1000;
    (interactions||[]).forEach(inter => {
      if (Math.abs(ms - inter.timestampMs) < 500 && !triggered.has(inter.id)) {
        triggered.add(inter.id);
        showFloatingCard(inter);
      }
    });
  });
}

function showFloatingCard(inter) {
  const container = document.getElementById('interactionFloat');
  const typeMap = { 'VOTE': { label: '&#128499; 投票', cls: 'vote' }, 'QUIZ': { label: '&#128218; 答题', cls: 'quiz' }, 'CHOICE': { label: '&#128256; 抉择', cls: 'choice' }, 'EGG': { label: '&#127873; 彩蛋', cls: 'egg' } };
  const t = typeMap[inter.type] || typeMap['VOTE'];
  const cardId = 'if-' + inter.id;
  if (document.getElementById(cardId)) return;
  const card = document.createElement('div');
  card.className = 'if-card ' + t.cls;
  card.id = cardId;
  if (inter.type === 'EGG') {
    card.innerHTML = `<div class="if-header"><span class="if-badge ${t.cls}">${t.label}</span><button class="if-close" onclick="closeFloatCard('${cardId}')">&#10005;</button></div><div class="if-question">${inter.questionText}</div><button class="if-egg-btn" onclick="collectEgg(${inter.id},'${cardId}')">&#127873; 领取彩蛋</button><div class="if-progress"><div class="if-progress-fill" style="width:100%"></div></div>`;
    container.appendChild(card);
    startCardTimer(card, cardId, 10000);
  } else {
    card.innerHTML = `<div class="if-header"><span class="if-badge ${t.cls}">${t.label}</span><button class="if-close" onclick="closeFloatCard('${cardId}')">&#10005;</button></div><div class="if-question">${inter.questionText}</div><div class="if-options">${inter.options.map(o => `<button class="if-opt" data-id="${o.id}" onclick="floatSelect(${o.id},${inter.id},'${cardId}')">${o.text}</button>`).join('')}</div><div class="if-progress"><div class="if-progress-fill" style="width:100%"></div></div>`;
    container.appendChild(card);
    startCardTimer(card, cardId, 15000);
  }
}

function startCardTimer(card, cardId, duration) {
  const fill = card.querySelector('.if-progress-fill');
  if (fill) { fill.style.transitionDuration = duration + 'ms'; requestAnimationFrame(() => { fill.style.width = '0%'; }); }
  setTimeout(() => closeFloatCard(cardId), duration);
}

function closeFloatCard(id) {
  const el = document.getElementById(id);
  if (el) { el.style.animation = 'slideIn .3s ease-in reverse'; setTimeout(() => el.remove(), 300); }
}

async function collectEgg(interId, cardId) {
  if (!currentUser) { showToast('请先登录'); return; }
  try {
    const r = await api('/api/interaction/answer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, interactionId: interId, choiceId: 1 }) });
    if (r.success) { showPoints('+5'); showToast('&#127873; 彩蛋已收集！+5积分'); const card = document.getElementById(cardId); if (card) { const btn = card.querySelector('.if-egg-btn'); if (btn) { btn.textContent = '&#10003; 已收集'; btn.disabled = true; btn.style.opacity = '0.5'; } } }
    else { showToast('已经领取过了'); }
  } catch (e) { showToast('领取失败'); }
  setTimeout(() => closeFloatCard(cardId), 2000);
}

async function floatSelect(optId, interId, cardId) {
  if (!currentUser) { showToast('请先登录'); return; }
  const card = document.getElementById(cardId);
  if (!card) return;
  card.querySelectorAll('.if-opt').forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; b.classList.add(b.dataset.id == optId ? 'selected' : ''); });
  try {
    const r = await api('/api/interaction/answer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, interactionId: interId, choiceId: optId }) });
    if (r.success) {
      const inter = currentEpisode.interactions.find(i => i.id === interId);
      if (inter?.type === 'QUIZ') {
        showPoints('+10');
        card.querySelectorAll('.if-opt').forEach(b => { if (inter.correctOptionId) { if (b.dataset.id == inter.correctOptionId) b.classList.add('correct'); else if (b.dataset.id == optId && optId != inter.correctOptionId) b.classList.add('wrong'); } });
      }
      if (r.stats) renderFloatStats(r.stats, interId, cardId);
    }
  } catch (e) {}
}

function renderFloatStats(stats, interId, cardId) {
  const card = document.getElementById(cardId);
  if (!card) return;
  const inter = currentEpisode.interactions.find(i => i.id === interId);
  if (!inter) return;
  const colors = ['#8B5CF6', '#38BDF8', '#E8456B', '#F59E0B'];
  const statsHtml = inter.options.map((o, i) => { const s = stats.optionStats[o.id] || { count: 0, percentage: 0 }; return `<div class="if-stat-row"><span class="if-stat-label">${o.text}</span><div class="if-stat-track"><div class="if-stat-fill" style="width:${s.percentage}%;background:${colors[i % 4]}"></div></div><span class="if-stat-pct">${s.percentage}%</span></div>`; }).join('');
  let statsDiv = card.querySelector('.if-stats');
  if (!statsDiv) { statsDiv = document.createElement('div'); statsDiv.className = 'if-stats'; card.appendChild(statsDiv); }
  statsDiv.innerHTML = statsHtml;
  setTimeout(() => closeFloatCard(cardId), 4000);
}

// ========== Online Heartbeat ==========
function startOnlineHeartbeat(episodeId) {
  if (onlineTimer) clearInterval(onlineTimer);
  sendHeartbeat(episodeId);
  onlineTimer = setInterval(() => sendHeartbeat(episodeId), 10000);
  updateOnlineCount(episodeId);
  setInterval(() => updateOnlineCount(episodeId), 15000);
}

function sendHeartbeat(episodeId) {
  if (!currentUser) return;
  api('/api/online/heartbeat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: currentUser.userId, episodeId }) });
}

function updateOnlineCount(episodeId) {
  api(`/api/online/episode/${episodeId}/count`).then(r => {
    document.getElementById('onlineCount').textContent = r.onlineCount || 0;
  }).catch(() => {});
}

// ========== Player Controls ==========
function togglePlay() {
  const v = document.getElementById('videoPlayer');
  v.paused ? (v.play(), document.getElementById('playPauseBtn').innerHTML = '&#9646;&#9646;') : (v.pause(), document.getElementById('playPauseBtn').innerHTML = '&#9654;');
}
function updateTime() {
  const v = document.getElementById('videoPlayer');
  document.getElementById('progressFill').style.width = (v.currentTime / v.duration * 100) + '%';
  document.getElementById('currentTime').textContent = formatTime(v.currentTime);
}
function seekTo(s) { const v = document.getElementById('videoPlayer'); v.currentTime = s; v.play(); }
function skipBack() { document.getElementById('videoPlayer').currentTime = Math.max(0, document.getElementById('videoPlayer').currentTime - 10); }
function skipForward() { const v = document.getElementById('videoPlayer'); v.currentTime = Math.min(v.duration, v.currentTime + 10); }
function changeSpeed() {
  const sp = [0.5, 0.75, 1, 1.25, 1.5, 2];
  currentSpeed = sp[(sp.indexOf(currentSpeed) + 1) % sp.length];
  document.getElementById('videoPlayer').playbackRate = currentSpeed;
  document.getElementById('speedBtn').textContent = currentSpeed + 'x';
}
document.getElementById('progressContainer').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  document.getElementById('videoPlayer').currentTime = (e.clientX - r.left) / r.width * document.getElementById('videoPlayer').duration;
});
function playPrevEp() { if (!currentDrama || !currentEpisode) return; const eps = currentDrama.episodes; const i = eps.findIndex(e => e.id === currentEpisode.episodeId); if (i > 0) playEpisode(eps[i - 1].id); }
function playNextEp() { if (!currentDrama || !currentEpisode) return; const eps = currentDrama.episodes; const i = eps.findIndex(e => e.id === currentEpisode.episodeId); if (i < eps.length - 1) playEpisode(eps[i + 1].id); }
function backToDetail() { document.getElementById('videoPlayer').pause(); document.getElementById('bottomNav').style.display = 'flex'; showPage('detailPage'); }

// ========== Profile ==========
async function loadProfile() {
  if (!currentUser) return;
  try {
    const u = await api(`/api/auth/${currentUser.userId}`);
    document.getElementById('profileAvatar').textContent = (u.nickname || u.username || '?')[0];
    document.getElementById('profileName').textContent = u.nickname || u.username;
    document.getElementById('profileUsername').textContent = '@' + u.username;
    document.getElementById('profilePoints').textContent = u.points || 0;
  } catch (e) {}
  try {
    const eggs = await api(`/api/user/${currentUser.userId}/eggs`);
    const eggDiv = document.getElementById('eggCollection');
    if (eggs.length === 0) {
      eggDiv.innerHTML = '<div style="text-align:center;padding:16px;color:var(--light-gray);font-size:13px">还没有收集到彩蛋，去看剧发现隐藏彩蛋吧！</div>';
    } else {
      eggDiv.innerHTML = eggs.map(egg => `<div class="profile-menu-item" style="border-left:3px solid var(--highlight-gold)"><span class="pm-icon">&#127873;</span><div style="flex:1"><div style="font-size:14px">${egg.eggContent || '神秘彩蛋'}</div><div style="font-size:11px;color:var(--light-gray);margin-top:2px">${new Date(egg.collectedAt).toLocaleDateString()}</div></div></div>`).join('');
    }
  } catch (e) {}
}

// ========== Utils ==========
function formatTime(s) { const m = Math.floor(s / 60); return m + ':' + Math.floor(s % 60).toString().padStart(2, '0'); }
function formatViews(v) { return v >= 10000 ? (v / 10000).toFixed(1) + '万次播放' : v + '次播放'; }
function showToast(msg) { const t = document.getElementById('toast'); t.innerHTML = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function showPoints(text) { const p = document.createElement('div'); p.className = 'points-popup'; p.textContent = text; p.style.left = (Math.random() * 60 + 20) + '%'; p.style.top = '50%'; document.body.appendChild(p); setTimeout(() => p.remove(), 1500); }

// ========== Init ==========
loadUser();
if (currentUser) {
  navTo('homePage');
} else {
  showAuthPage();
}

// Check URL for shared drama link
const params = new URLSearchParams(location.search);
if (params.get('drama')) {
  if (currentUser) { showDetail(+params.get('drama')); }
}
</script>
